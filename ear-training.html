<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אוזן מוזיקלית</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--card:#10101a;--border:#1e1e2c;
  --gold:#c8a050;--gold-dim:#5a4820;
  --text:#d8d0c0;--dim:#4a4840;
  --red:#d05555;--green:#50b050;--blue:#5588dd;--yellow:#c8b040;
}
body{
  background:var(--bg);color:var(--text);font-family:'Georgia',serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:24px 14px 60px;
}
.wrap{width:100%;max-width:440px}
.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}
.title{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:600;color:var(--gold)}
.subtitle{font-family:'DM Mono',monospace;font-size:9px;color:#1e1e28;letter-spacing:2px;margin-top:3px}
.streak{font-size:20px;min-width:40px;text-align:left}
.stats{display:flex;gap:8px;margin-bottom:12px}
.stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 0;text-align:center}
.stat-v{font-family:'DM Mono',monospace;font-size:20px;color:var(--gold)}
.stat-l{font-size:10px;color:var(--dim);margin-top:2px}
.diff-row{display:flex;gap:8px;margin-bottom:12px}
.diff-btn{flex:1;padding:8px 0;font-family:'DM Mono',monospace;font-size:11px;border-radius:8px;cursor:pointer;background:transparent;color:var(--dim);border:1px solid var(--border);transition:all .2s}
.diff-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(200,160,80,.07)}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 20px 24px;text-align:center;position:relative;overflow:hidden;margin-bottom:12px}
.card::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(200,160,80,.06) 0%,transparent 65%)}
.note-display{font-family:'Cormorant Garamond',serif;font-size:96px;font-weight:300;line-height:1;letter-spacing:-3px;transition:color .3s;text-shadow:0 0 50px rgba(200,160,80,.15)}
.note-latin{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold-dim);letter-spacing:3px;margin-top:5px}
.feedback-wrap{margin-top:18px;min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.fb-arrow{font-size:50px;line-height:1;transition:all .1s}
.fb-text{font-family:'Cormorant Garamond',serif;font-size:22px;transition:color .15s;min-height:30px}
.fb-cents{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);margin-top:1px}
.tuner-wrap{margin-top:14px;padding:0 4px}
.tuner-track{height:6px;background:#0e0e18;border-radius:3px;position:relative;overflow:visible}
.tuner-zone{position:absolute;top:0;bottom:0;left:42%;right:42%;background:rgba(80,176,80,.15);border-radius:3px}
.tuner-center-line{position:absolute;top:-4px;left:50%;width:1px;height:14px;background:#252535;transform:translateX(-50%)}
.tuner-needle{position:absolute;top:-5px;width:4px;height:16px;background:var(--gold);border-radius:2px;transform:translateX(-50%);box-shadow:0 0 8px rgba(200,160,80,.5);transition:left .07s linear}
.tuner-needle.green{background:var(--green);box-shadow:0 0 10px rgba(80,176,80,.6)}
.tuner-needle.high{background:var(--blue);box-shadow:0 0 8px rgba(85,136,221,.5)}
.tuner-needle.low{background:var(--red);box-shadow:0 0 8px rgba(208,85,85,.5)}
.tuner-labels{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:#252535;margin-top:5px}
.freq-display{font-family:'DM Mono',monospace;font-size:12px;color:#333340;margin-top:6px;min-height:18px}
.success-flash{position:fixed;inset:0;background:rgba(80,176,80,.15);pointer-events:none;opacity:0;transition:opacity .1s}
.success-flash.show{opacity:1}
.btns{display:flex;gap:8px;margin-bottom:12px}
.btn-main{flex:2;padding:13px 0;background:linear-gradient(135deg,#c8a050,#7a5a20);color:#07070f;border:none;border-radius:10px;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;letter-spacing:1px;cursor:pointer;transition:all .2s}
.btn-main:hover:not(:disabled){opacity:.85;transform:translateY(-1px)}
.btn-main:disabled{opacity:.3;cursor:not-allowed}
.btn-sec{flex:1;padding:11px 0;background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:10px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s}
.btn-sec:hover:not(:disabled){border-color:#3a3848;color:#aaa}
.piano-label{font-family:'DM Mono',monospace;font-size:10px;color:#1e1e28;text-align:center;margin-bottom:7px;letter-spacing:1px}
.piano{display:flex;justify-content:center;gap:5px;flex-wrap:wrap}
.key{width:44px;height:58px;border-radius:8px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:18px;border:1px solid #202030;transition:all .12s;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:5px;gap:1px}
.key .kl{font-family:'DM Mono',monospace;font-size:8px}
.key.wh{background:#181824;color:#3a3850}
.key.bk{background:#101018;color:#2a2840}
.key:hover{filter:brightness(1.6);transform:scale(1.05)}
.key.is-target{border-color:var(--gold)!important;color:var(--gold)!important;background:rgba(200,160,80,.1)!important}
.err{font-family:'DM Mono',monospace;font-size:11px;color:#b06060;text-align:center;margin-top:8px;min-height:18px}
.idle-wrap{padding:10px 0}
.idle-icon{font-size:44px;margin-bottom:12px}
.idle-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:#7a7060}
.idle-sub{font-size:12px;color:#2a2828;margin-top:8px;line-height:1.9}
.fade{animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="success-flash" id="flash"></div>
<div class="wrap">
  <div class="header">
    <div>
      <div class="title">אוזן מוזיקלית</div>
      <div class="subtitle">EAR TRAINING · PITCH RECOGNITION</div>
    </div>
    <div class="streak" id="streakEl"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-v" id="sScore">0/0</div><div class="stat-l">ניקוד</div></div>
    <div class="stat"><div class="stat-v" id="sAcc">—</div><div class="stat-l">דיוק</div></div>
    <div class="stat"><div class="stat-v" id="sStreak">0</div><div class="stat-l">רצף</div></div>
  </div>
  <div class="diff-row">
    <button class="diff-btn active" id="dDia" onclick="setDiff('diatonic')">דיאטוני · 7 תווים</button>
    <button class="diff-btn" id="dChr" onclick="setDiff('chromatic')">כרומטי · 12 תווים</button>
  </div>
  <div class="card">
    <div id="phIdle" class="idle-wrap">
      <div class="idle-icon">🎵</div>
      <div class="idle-title">מוכנה?</div>
      <div class="idle-sub">האפליקציה תנגן תו<br>שירי אחריו — היא תכוון אותך<br>⬆ גבוהי / ⬇ נמוכי / 🎯 בול!<br>כשמדויקת — עוברת אוטומטית</div>
    </div>
    <div id="phPlay" style="display:none">
      <div class="note-display" id="notePlay" style="color:var(--gold)"></div>
      <div class="note-latin" id="latinPlay"></div>
      <div class="feedback-wrap">
        <div class="fb-text" style="color:var(--dim)">♪ הקשיבי לתו...</div>
      </div>
    </div>
    <div id="phListen" style="display:none">
      <div class="note-display" id="noteListen" style="color:var(--gold)"></div>
      <div class="note-latin" id="latinListen"></div>
      <div class="feedback-wrap">
        <div class="fb-arrow" id="fbArrow">🎤</div>
        <div class="fb-text" id="fbText" style="color:var(--dim)">שירי את התו</div>
        <div class="fb-cents" id="fbCents"></div>
      </div>
      <div class="tuner-wrap">
        <div class="tuner-track">
          <div class="tuner-zone"></div>
          <div class="tuner-center-line"></div>
          <div class="tuner-needle" id="needle" style="left:50%"></div>
        </div>
        <div class="tuner-labels"><span>♭ נמוך</span><span id="detectedNote">—</span><span>גבוה ♯</span></div>
      </div>
      <div class="freq-display" id="freqDisplay"></div>
      <div class="err" id="errMsg"></div>
    </div>
  </div>
  <div class="btns">
    <button class="btn-main" id="btnMain" onclick="handleMain()">▶ תו חדש</button>
    <button class="btn-sec" id="btnReplay" onclick="replayNote()" style="display:none">שמעי שוב</button>
    <button class="btn-sec" id="btnSkip" onclick="skipNote()" style="display:none">דלגי</button>
  </div>
  <div id="pianoWrap" style="display:none">
    <div class="piano-label">לחצי על תו לשמיעה</div>
    <div class="piano" id="piano"></div>
  </div>
</div>

<script>
const NOTES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const HE={C:"דו","C#":"דו♯",D:"רה","D#":"רה♯",E:"מי",F:"פה","F#":"פה♯",G:"סול","G#":"סול♯",A:"לה","A#":"לה♯",B:"סי"};
const FREQ={C:261.63,"C#":277.18,D:293.66,"D#":311.13,E:329.63,F:349.23,"F#":369.99,G:392,"G#":415.3,A:440,"A#":466.16,B:493.88};
const DIATONIC=["C","D","E","F","G","A","B"];

let diff="diatonic",curNote=null,phase="idle";
let score={ok:0,total:0},streak=0;
let audioCtx,analyser,micStream,rafId;
let inSuccess=false,goodSince=null,lastPos=50,smoothedCents=0;

const CENTS_OK=30, SUCCESS_HOLD=800;

function pool(){return diff==="diatonic"?DIATONIC:NOTES;}

function getCtx(){
  if(!audioCtx||audioCtx.state==="closed") audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(note,cb){
  const ctx=getCtx(),f=FREQ[note];
  const osc=ctx.createOscillator(),g=ctx.createGain();
  osc.connect(g);g.connect(ctx.destination);
  osc.type="sine";osc.frequency.value=f;
  g.gain.setValueAtTime(0,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0.42,ctx.currentTime+.05);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2);
  osc.start();osc.stop(ctx.currentTime+2);
  if(cb) setTimeout(cb,2100);
}
function detectPitch(buf,sr){
  let rms=0;
  for(let i=0;i<buf.length;i++) rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/buf.length);
  if(rms<0.01) return null;
  const MIN=Math.floor(sr/1100),MAX=Math.floor(sr/55);
  let best=-1,bestC=0,lastC=1,found=false;
  for(let o=MIN;o<MAX;o++){
    let c=0;
    for(let i=0;i<MAX;i++) c+=Math.abs(buf[i]-buf[i+o]);
    c=1-c/MAX;
    if(c>.88&&c>lastC){found=true;if(c>bestC){bestC=c;best=o;}}
    else if(found) break;
    lastC=c;
  }
  return best===-1||bestC<.88?null:sr/best;
}
function freqToNote(f){
  if(!f) return null;
  const s=Math.round(12*Math.log2(f/440)+69);
  return NOTES[((s%12)+12)%12];
}
function getCents(f,note){
  const t=FREQ[note];
  if(!t||!f) return 0;
  return Math.round(1200*Math.log2(f/t));
}
async function startMic(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    const ctx=getCtx(),src=ctx.createMediaStreamSource(micStream);
    analyser=ctx.createAnalyser();analyser.fftSize=4096;
    src.connect(analyser);
    return true;
  }catch(e){
    document.getElementById("errMsg").textContent="⚠ לא ניתן לגשת למיקרופון";
    return false;
  }
}
function stopMic(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  analyser=null;
}

function listenLoop(){
  if(!analyser) return;
  const buf=new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  const freq=detectPitch(buf,getCtx().sampleRate);
  const note=freqToNote(freq);
  const cents=freq?getCents(freq,curNote):null;
  const abs=cents!==null?Math.abs(cents):null;

  const needle=document.getElementById("needle");
  const fbArrow=document.getElementById("fbArrow");
  const fbText=document.getElementById("fbText");
  const fbCents=document.getElementById("fbCents");
  const detEl=document.getElementById("detectedNote");
  const freqEl=document.getElementById("freqDisplay");

  if(freq&&note){
    // Smooth the cents so needle glides instead of jumps
    smoothedCents = smoothedCents*0.6 + cents*0.4;
    const pos=Math.max(3,Math.min(97,50+smoothedCents/2));
    lastPos=pos;
    needle.style.left=pos+"%";
    detEl.textContent=HE[note]+" ("+note+")";
    freqEl.textContent=Math.round(freq)+" Hz";

    if(abs<=CENTS_OK){
      needle.className="tuner-needle green";
      fbArrow.textContent="🎯";
      fbText.textContent="בול! מחזיקי...";
      fbText.style.color="var(--green)";
      fbCents.textContent=Math.round(smoothedCents)+"¢";
      if(!goodSince) goodSince=Date.now();
      if(!inSuccess&&Date.now()-goodSince>=SUCCESS_HOLD){
        onSuccess(); return;
      }
    } else {
      goodSince=null;
      const high=cents>0;
      if(abs<=80){
        needle.className=high?"tuner-needle high":"tuner-needle low";
        fbArrow.textContent=high?"↓":"↑";
        fbText.textContent=high?"קצת גבוהה — נמוכי קצת":"קצת נמוכה — גבוהי קצת";
        fbText.style.color="var(--yellow)";
      } else {
        needle.className=high?"tuner-needle high":"tuner-needle low";
        fbArrow.textContent=high?"⬇":"⬆";
        fbText.textContent=high?"גבוהה מדי — נמוכי":"נמוכה מדי — גבוהי";
        fbText.style.color=high?"var(--blue)":"var(--red)";
      }
      fbCents.textContent=(high?"+":"")+Math.round(smoothedCents)+"¢";
    }
  } else {
    // No signal — needle stays put, just show mic icon
    goodSince=null;
    needle.style.left=lastPos+"%";
    detEl.textContent="";freqEl.textContent="";
    fbArrow.textContent="🎤";
    fbText.textContent="שירי את התו";
    fbText.style.color="var(--dim)";
    fbCents.textContent="";
  }
  rafId=requestAnimationFrame(listenLoop);
}

function onSuccess(){
  inSuccess=true;
  stopMic();
  score.ok++;score.total++;streak++;
  updateStats();
  document.getElementById("flash").classList.add("show");
  setTimeout(()=>document.getElementById("flash").classList.remove("show"),400);
  document.getElementById("fbArrow").textContent="✅";
  document.getElementById("fbText").textContent="מדויק! עוברת לתו הבא...";
  document.getElementById("fbText").style.color="var(--green)";
  document.getElementById("fbCents").textContent="";
  setTimeout(startNewRound,1400);
}

function showPhase(p){
  phase=p;
  ["phIdle","phPlay","phListen"].forEach(id=>document.getElementById(id).style.display="none");
  const map={idle:"phIdle",playing:"phPlay",listen:"phListen"};
  const el=document.getElementById(map[p]);
  if(el){el.style.display="";el.classList.add("fade");setTimeout(()=>el.classList.remove("fade"),400);}
  const bm=document.getElementById("btnMain"),br=document.getElementById("btnReplay"),bs=document.getElementById("btnSkip"),pw=document.getElementById("pianoWrap");
  if(p==="idle"){bm.textContent="▶ תו חדש";bm.disabled=false;br.style.display="none";bs.style.display="none";pw.style.display="none";}
  else if(p==="playing"){bm.textContent="...";bm.disabled=true;br.style.display="none";bs.style.display="none";pw.style.display="";}
  else if(p==="listen"){bm.textContent="...";bm.disabled=true;br.style.display="";bs.style.display="";pw.style.display="";}
}

function handleMain(){if(phase==="idle") startNewRound();}

async function startNewRound(){
  stopMic();inSuccess=false;goodSince=null;lastPos=50;smoothedCents=0;
  document.getElementById("errMsg").textContent="";
  document.getElementById("needle").style.left="50%";
  document.getElementById("needle").className="tuner-needle";
  document.getElementById("detectedNote").textContent="—";
  document.getElementById("freqDisplay").textContent="";

  const p=pool();
  curNote=p[Math.floor(Math.random()*p.length)];
  document.getElementById("notePlay").textContent=HE[curNote];
  document.getElementById("latinPlay").textContent=curNote+" · "+Math.round(FREQ[curNote])+" Hz";
  document.getElementById("noteListen").textContent=HE[curNote];
  document.getElementById("latinListen").textContent=curNote+" · "+Math.round(FREQ[curNote])+" Hz";
  document.getElementById("fbArrow").textContent="🎤";
  document.getElementById("fbText").textContent="שירי את התו";
  document.getElementById("fbText").style.color="var(--dim)";
  document.getElementById("fbCents").textContent="";
  buildPiano();
  showPhase("playing");
  playTone(curNote,async()=>{
    showPhase("listen");
    const ok=await startMic();
    if(ok) rafId=requestAnimationFrame(listenLoop);
  });
}
function replayNote(){if(curNote) playTone(curNote);}
function skipNote(){stopMic();score.total++;streak=0;updateStats();startNewRound();}
function updateStats(){
  document.getElementById("sScore").textContent=score.ok+"/"+score.total;
  document.getElementById("sAcc").textContent=score.total?Math.round(score.ok/score.total*100)+"%":"—";
  document.getElementById("sStreak").textContent=streak;
  document.getElementById("streakEl").textContent=streak>=3?"🔥".repeat(Math.min(streak,5)):"";
}
function setDiff(d){
  diff=d;
  document.getElementById("dDia").className="diff-btn"+(d==="diatonic"?" active":"");
  document.getElementById("dChr").className="diff-btn"+(d==="chromatic"?" active":"");
  stopMic();showPhase("idle");curNote=null;
}
function buildPiano(){
  const p=pool(),c=document.getElementById("piano");
  c.innerHTML="";
  p.forEach(n=>{
    const btn=document.createElement("button");
    btn.className="key "+(n.includes("#")?"bk":"wh")+(n===curNote?" is-target":"");
    btn.innerHTML=HE[n]+'<span class="kl">'+n+'</span>';
    btn.onclick=()=>playTone(n);
    c.appendChild(btn);
  });
}
</script>
</body>
</html>
