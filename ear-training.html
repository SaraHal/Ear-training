<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אוזן מוזיקלית</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07070f;
    --card: #10101a;
    --border: #1e1e2c;
    --gold: #c8a050;
    --gold-dim: #6a5828;
    --text: #d8d0c0;
    --dim: #4a4840;
    --red: #d04040;
    --green: #60b060;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 48px;
  }

  .wrap { width: 100%; max-width: 480px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; }
  .title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--gold); }
  .subtitle { font-family: 'DM Mono', monospace; font-size: 10px; color: #2a2830; letter-spacing: 2px; margin-top: 3px; }
  .streak-badge { font-size: 22px; }

  /* Stats */
  .stats { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 0; text-align: center;
  }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 22px; color: var(--gold); }
  .stat-lbl { font-size: 10px; color: var(--dim); margin-top: 2px; }

  /* Difficulty */
  .diff-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .diff-btn {
    flex: 1; padding: 9px 0; font-family: 'DM Mono', monospace; font-size: 11px;
    border-radius: 8px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    background: transparent; color: var(--dim); border: 1px solid var(--border);
  }
  .diff-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(200,160,80,0.07); }

  /* Main card */
  .main-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px 28px; text-align: center;
    position: relative; overflow: hidden; margin-bottom: 16px;
  }
  .main-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(200,160,80,0.06) 0%, transparent 65%);
    pointer-events: none;
  }

  .big-note {
    font-family: 'Cormorant Garamond', serif;
    font-size: 108px; font-weight: 300; line-height: 1;
    color: var(--gold); letter-spacing: -3px;
    text-shadow: 0 0 60px rgba(200,160,80,0.2);
    transition: color 0.3s;
  }
  .note-latin {
    font-family: 'DM Mono', monospace; font-size: 14px;
    color: var(--gold-dim); letter-spacing: 3px; margin-top: 6px;
  }

  .phase-label {
    font-family: 'DM Mono', monospace; font-size: 12px;
    letter-spacing: 1px; margin-top: 20px;
  }

  /* Tuner */
  .tuner-wrap { margin-top: 18px; }
  .tuner-bar {
    height: 5px; background: #181820; border-radius: 3px;
    position: relative; margin: 0 8px;
  }
  .tuner-center {
    position: absolute; top: -5px; left: 50%;
    width: 1px; height: 15px; background: #2a2a38;
    transform: translateX(-50%);
  }
  .tuner-needle {
    position: absolute; top: -7px; width: 3px; height: 19px;
    background: var(--gold); border-radius: 2px;
    transform: translateX(-50%);
    box-shadow: 0 0 8px rgba(200,160,80,0.5);
    transition: left 0.08s linear;
  }
  .tuner-labels {
    display: flex; justify-content: space-between;
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: #2a2838; margin-top: 5px; padding: 0 8px;
  }
  .tuner-detected {
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--gold); margin-top: 8px; min-height: 20px;
  }

  /* Record button */
  .rec-btn {
    width: 76px; height: 76px; border-radius: 50%;
    background: radial-gradient(circle, #e04444, #921414);
    border: 3px solid #ff6060; color: white;
    font-size: 26px; cursor: pointer;
    box-shadow: 0 0 0 0 rgba(220,60,60,0.4);
    transition: transform 0.15s;
    margin-top: 20px;
  }
  .rec-btn:hover { transform: scale(1.07); box-shadow: 0 0 20px rgba(220,60,60,0.35); }
  .rec-btn.active { animation: recPulse 1s ease-in-out infinite; }
  @keyframes recPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,80,80,0.5); }
    50%      { box-shadow: 0 0 0 18px rgba(255,80,80,0); }
  }

  /* Result */
  .result-icon { font-size: 46px; margin-bottom: 10px; }
  .result-title {
    font-family: 'Cormorant Garamond', serif; font-size: 26px;
    margin-bottom: 12px;
  }
  .result-detail {
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--dim); line-height: 2;
  }
  .result-detail span { color: var(--gold); }

  /* Controls */
  .controls { display: flex; gap: 10px; margin-bottom: 20px; }
  .btn-main {
    flex: 2; padding: 14px 0;
    background: linear-gradient(135deg, #c8a050, #7a5a20);
    color: #07070f; border: none; border-radius: 10px;
    font-family: 'DM Mono', monospace; font-size: 13px;
    font-weight: 500; letter-spacing: 1.5px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-main:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
  .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-sec {
    flex: 1; padding: 12px 0;
    background: transparent; border: 1px solid var(--border);
    color: var(--dim); border-radius: 10px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-sec:hover:not(:disabled) { border-color: #3a3848; color: #aaa; }
  .btn-sec:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Piano */
  .piano-section { margin-top: 4px; }
  .piano-label { font-family: 'DM Mono', monospace; font-size: 10px; color: #222230; text-align: center; margin-bottom: 8px; letter-spacing: 1px; }
  .piano-keys { display: flex; justify-content: center; gap: 4px; }
  .key {
    width: 38px; height: 56px; border-radius: 7px;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 5px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 9px;
    border: 1px solid #252530; transition: all 0.12s;
  }
  .key:hover { filter: brightness(1.5); transform: scale(1.04); }
  .key.white { background: #1c1c26; color: #3a3848; }
  .key.black { background: #111118; color: #2a2838; }
  .key.target { border-color: var(--gold) !important; color: var(--gold) !important; background: rgba(200,160,80,0.12) !important; }

  /* Error */
  .error-msg { font-family: 'DM Mono', monospace; font-size: 12px; color: #c07070; margin-top: 14px; }

  /* Idle */
  .idle-icon { font-size: 48px; margin-bottom: 14px; }
  .idle-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #6a6058; }
  .idle-sub { font-size: 12px; color: #2a2828; margin-top: 8px; line-height: 1.9; }

  .spinner {
    width: 34px; height: 34px; margin: 18px auto 0;
    border: 2px solid #1e1e2c; border-top-color: var(--gold);
    border-radius: 50%; animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .fade { animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  footer { margin-top: 32px; font-family: 'DM Mono', monospace; font-size: 10px; color: #1a1a20; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="title">אוזן מוזיקלית</div>
      <div class="subtitle">EAR TRAINING · PITCH RECOGNITION</div>
    </div>
    <div class="streak-badge" id="streakBadge"></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><div class="stat-val" id="statScore">0/0</div><div class="stat-lbl">ניקוד</div></div>
    <div class="stat-card"><div class="stat-val" id="statAcc">—</div><div class="stat-lbl">דיוק</div></div>
    <div class="stat-card"><div class="stat-val" id="statStreak">0</div><div class="stat-lbl">רצף</div></div>
  </div>

  <!-- Difficulty -->
  <div class="diff-row">
    <button class="diff-btn active" id="btnDia" onclick="setDiff('diatonic')">דיאטוני · 7 תווים</button>
    <button class="diff-btn" id="btnChr" onclick="setDiff('chromatic')">כרומטי · 12 תווים</button>
  </div>

  <!-- Main card -->
  <div class="main-card" id="mainCard">
    <div class="idle fade" id="phaseIdle">
      <div class="idle-icon">🎵</div>
      <div class="idle-title">מוכנה להתחיל?</div>
      <div class="idle-sub">האפליקציה תנגן תו<br>שירי אחריו — המיקרופון יזהה בזמן אמת</div>
    </div>
    <div style="display:none" id="phasePlay">
      <div class="big-note" id="bigNote"></div>
      <div class="note-latin" id="noteLatin"></div>
      <div class="phase-label" style="color:var(--gold); animation: recPulse 1.2s infinite">♪ מנגן...</div>
    </div>
    <div style="display:none" id="phaseListen">
      <div class="big-note" id="bigNote2"></div>
      <div class="note-latin" id="noteLatin2"></div>
      <div class="tuner-wrap">
        <div class="tuner-bar">
          <div class="tuner-center"></div>
          <div class="tuner-needle" id="tunerNeedle" style="left:50%"></div>
        </div>
        <div class="tuner-labels"><span>♭ נמוך</span><span id="tunerInfo">—</span><span>גבוה ♯</span></div>
        <div class="tuner-detected" id="tunerDetected"></div>
      </div>
      <div class="phase-label" style="color:#c06060" id="listenLabel">🎤 שירי...</div>
      <div class="error-msg" id="errorMsg"></div>
    </div>
    <div style="display:none" id="phaseResult">
      <div class="big-note" id="bigNote3"></div>
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-detail" id="resultDetail"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-main" id="btnMain" onclick="handleMain()">▶ תו חדש</button>
    <button class="btn-sec" id="btnReplay" onclick="replayNote()" style="display:none">שמעי שוב</button>
    <button class="btn-sec" id="btnReset" onclick="resetScore()" style="display:none">אפס</button>
  </div>

  <!-- Piano -->
  <div class="piano-section" id="pianoSection" style="display:none">
    <div class="piano-label">REFERENCE KEYBOARD — לחצי לשמיעה</div>
    <div class="piano-keys" id="pianoKeys"></div>
  </div>

</div>
<footer>SOLFÈGE · PITCH RECOGNITION</footer>

<script>
const NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const NOTE_HE = {C:"דו","C#":"דו♯",D:"רה","D#":"רה♯",E:"מי",F:"פה","F#":"פה♯",G:"סול","G#":"סול♯",A:"לה","A#":"לה♯",B:"סי"};
const NOTE_FREQ = {C:261.63,"C#":277.18,D:293.66,"D#":311.13,E:329.63,F:349.23,"F#":369.99,G:392,
  "G#":415.3,A:440,"A#":466.16,B:493.88};
const DIATONIC = ["C","D","E","F","G","A","B"];

let difficulty = "diatonic";
let currentNote = null;
let phase = "idle"; // idle | playing | listen | result
let score = {correct:0, total:0};
let streak = 0;
let audioCtx = null;
let analyser = null;
let micStream = null;
let rafId = null;
let listenTimer = null;
let bestNote = null;
let bestNoteCount = 0;
let noteHistory = [];

function notePool() { return difficulty === "diatonic" ? DIATONIC : NOTES; }

function getAudioCtx() {
  if (!audioCtx || audioCtx.state === "closed")
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(note, cb) {
  const ctx = getAudioCtx();
  const freq = NOTE_FREQ[note];
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = "sine";
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.42, ctx.currentTime + 0.04);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.0);
  osc.start(); osc.stop(ctx.currentTime + 2.0);
  if (cb) setTimeout(cb, 2100);
}

// Autocorrelation pitch detection
function detectPitch(buffer, sampleRate) {
  let rms = 0;
  for (let i = 0; i < buffer.length; i++) rms += buffer[i]*buffer[i];
  rms = Math.sqrt(rms / buffer.length);
  if (rms < 0.012) return null;

  const SIZE = buffer.length;
  const MIN = Math.floor(sampleRate / 1050);
  const MAX = Math.floor(sampleRate / 55);
  let bestOffset = -1, bestCorr = 0, lastCorr = 1, found = false;

  for (let offset = MIN; offset < MAX; offset++) {
    let corr = 0;
    for (let i = 0; i < MAX; i++) corr += Math.abs(buffer[i] - buffer[i + offset]);
    corr = 1 - corr / MAX;
    if (corr > 0.9 && corr > lastCorr) {
      found = true;
      if (corr > bestCorr) { bestCorr = corr; bestOffset = offset; }
    } else if (found) break;
    lastCorr = corr;
  }
  if (bestOffset === -1 || bestCorr < 0.9) return null;
  return sampleRate / bestOffset;
}

function freqToNote(freq) {
  if (!freq) return null;
  const semitone = Math.round(12 * Math.log2(freq / 440) + 69);
  return NOTES[((semitone % 12) + 12) % 12];
}

function getCents(freq, note) {
  const target = NOTE_FREQ[note];
  if (!target || !freq) return 0;
  return Math.round(1200 * Math.log2(freq / target));
}

async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const ctx = getAudioCtx();
    const source = ctx.createMediaStreamSource(micStream);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 4096;
    source.connect(analyser);
    return true;
  } catch(e) {
    document.getElementById("errorMsg").textContent = "⚠ לא ניתן לגשת למיקרופון — אשרי הרשאה ב-" + location.protocol + " ונסי שוב";
    return false;
  }
}

function stopMic() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  analyser = null;
}

function startListenLoop() {
  bestNote = null; bestNoteCount = 0; noteHistory = [];
  const buf = new Float32Array(analyser.fftSize);

  function loop() {
    if (!analyser) return;
    analyser.getFloatTimeDomainData(buf);
    const freq = detectPitch(buf, getAudioCtx().sampleRate);
    const note = freqToNote(freq);
    const cents = getCents(freq, currentNote);

    // Update tuner UI
    if (note) {
      const needlePos = Math.max(5, Math.min(95, 50 + cents / 2));
      document.getElementById("tunerNeedle").style.left = needlePos + "%";
      document.getElementById("tunerInfo").textContent = note + (freq ? " · " + Math.round(freq) + "Hz" : "");
      document.getElementById("tunerDetected").textContent = NOTE_HE[note] || note;
      noteHistory.push(note);
      if (noteHistory.length > 30) noteHistory.shift();
    }

    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);

  // Auto-submit after 2.5s of listening
  listenTimer = setTimeout(() => {
    const detected = getMajorityNote();
    submitAnswer(detected);
  }, 2500);
}

function getMajorityNote() {
  if (!noteHistory.length) return null;
  const counts = {};
  noteHistory.forEach(n => counts[n] = (counts[n] || 0) + 1);
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
}

function submitAnswer(sung) {
  clearTimeout(listenTimer);
  stopMic();
  setPhase("result");

  if (!sung) {
    showResult(null, null);
    return;
  }

  const isCorrect = sung === currentNote;
  score.total++;
  if (isCorrect) { score.correct++; streak++; } else { streak = 0; }
  updateStats();
  showResult(isCorrect, sung);
}

// ── Phase management ─────────────────────────────────────
function setPhase(p) {
  phase = p;
  ["phaseIdle","phasePlay","phaseListen","phaseResult"].forEach(id => {
    document.getElementById(id).style.display = "none";
  });
  const map = { idle:"phaseIdle", playing:"phasePlay", listen:"phaseListen", result:"phaseResult" };
  const el = document.getElementById(map[p]);
  if (el) { el.style.display = ""; el.classList.add("fade"); setTimeout(() => el.classList.remove("fade"), 400); }

  const btnMain = document.getElementById("btnMain");
  const btnReplay = document.getElementById("btnReplay");
  const btnReset = document.getElementById("btnReset");
  const piano = document.getElementById("pianoSection");

  if (p === "idle") {
    btnMain.textContent = "▶ תו חדש"; btnMain.disabled = false;
    btnReplay.style.display = "none";
    btnReset.style.display = score.total > 0 ? "" : "none";
    piano.style.display = "none";
  } else if (p === "playing") {
    btnMain.textContent = "..."; btnMain.disabled = true;
    btnReplay.style.display = "none";
    piano.style.display = "";
  } else if (p === "listen") {
    btnMain.textContent = "..."; btnMain.disabled = true;
    btnReplay.style.display = "";
    btnReset.style.display = "none";
    piano.style.display = "";
    document.getElementById("errorMsg").textContent = "";
  } else if (p === "result") {
    btnMain.textContent = "▶ תו הבא"; btnMain.disabled = false;
    btnReplay.style.display = "";
    piano.style.display = "";
  }
}

function showResult(isCorrect, sung) {
  document.getElementById("bigNote3").textContent = NOTE_HE[currentNote];
  if (isCorrect === null) {
    document.getElementById("resultIcon").textContent = "🎙";
    document.getElementById("resultTitle").style.color = "#8a8070";
    document.getElementById("resultTitle").textContent = "לא זיהיתי שירה";
    document.getElementById("resultDetail").innerHTML = "נסי שוב — שירי בקול ברור יותר";
  } else if (isCorrect) {
    document.getElementById("resultIcon").textContent = "✅";
    document.getElementById("resultTitle").style.color = "var(--green)";
    document.getElementById("resultTitle").textContent = "מצוין! בול!";
    document.getElementById("resultDetail").innerHTML =
      `שרת: <span>${NOTE_HE[sung]} (${sung})</span> · יעד: <span>${NOTE_HE[currentNote]} (${currentNote})</span>`;
  } else {
    document.getElementById("resultIcon").textContent = "❌";
    document.getElementById("resultTitle").style.color = "var(--red)";
    document.getElementById("resultTitle").textContent = "לא מדויק";
    document.getElementById("resultDetail").innerHTML =
      `שרת: <span>${NOTE_HE[sung]} (${sung})</span><br>יעד היה: <span>${NOTE_HE[currentNote]} (${currentNote})</span>`;
  }
  buildPiano();
}

// ── Actions ─────────────────────────────────────────────
async function handleMain() {
  if (phase === "idle" || phase === "result") startNewRound();
}

async function startNewRound() {
  stopMic();
  clearTimeout(listenTimer);
  document.getElementById("tunerNeedle").style.left = "50%";
  document.getElementById("tunerInfo").textContent = "—";
  document.getElementById("tunerDetected").textContent = "";

  const pool = notePool();
  currentNote = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById("bigNote").textContent = NOTE_HE[currentNote];
  document.getElementById("noteLatin").textContent = currentNote + " · " + Math.round(NOTE_FREQ[currentNote]) + " Hz";
  document.getElementById("bigNote2").textContent = NOTE_HE[currentNote];
  document.getElementById("noteLatin2").textContent = currentNote + " · " + Math.round(NOTE_FREQ[currentNote]) + " Hz";
  buildPiano();

  setPhase("playing");
  playTone(currentNote, async () => {
    setPhase("listen");
    const ok = await startMic();
    if (ok) startListenLoop();
  });
}

function replayNote() {
  if (currentNote) playTone(currentNote);
}

function resetScore() {
  score = {correct:0, total:0}; streak = 0;
  updateStats();
  setPhase("idle");
}

function updateStats() {
  document.getElementById("statScore").textContent = score.correct + "/" + score.total;
  document.getElementById("statAcc").textContent = score.total ? Math.round(score.correct/score.total*100) + "%" : "—";
  document.getElementById("statStreak").textContent = streak;
  document.getElementById("streakBadge").textContent = streak >= 3 ? "🔥".repeat(Math.min(streak,5)) : "";
}

function setDiff(d) {
  difficulty = d;
  document.getElementById("btnDia").className = "diff-btn" + (d === "diatonic" ? " active" : "");
  document.getElementById("btnChr").className = "diff-btn" + (d === "chromatic" ? " active" : "");
  stopMic(); clearTimeout(listenTimer);
  setPhase("idle"); currentNote = null;
}

function buildPiano() {
  const pool = notePool();
  const container = document.getElementById("pianoKeys");
  container.innerHTML = "";
  pool.forEach(n => {
    const btn = document.createElement("button");
    btn.className = "key " + (n.includes("#") ? "black" : "white") + (n === currentNote ? " target" : "");
    btn.textContent = NOTE_HE[n];
    btn.onclick = () => playTone(n);
    container.appendChild(btn);
  });
}
</script>
</body>
</html>
